{% extends "base.html" %}
{% block title %}AgroAI - Register{% endblock %}

{% block public_content %}
<div class="min-h-[80vh] flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-xl">
        <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
            Create an AgroAI Account
        </h2>
        <p class="mt-2 text-center text-sm text-gray-600">
            Already have an account?
            <a href="{{ url_for('login') }}" class="font-medium text-emerald-600 hover:text-emerald-500 transition-colors">
                Log in here
            </a>
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-xl">
        <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10">
            <form class="space-y-6" action="{{ url_for('register') }}" method="POST">
                
                <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-2">
                    <div class="sm:col-span-2">
                        <label for="farmer_name" class="block text-sm font-medium text-gray-700">Full Name</label>
                        <div class="mt-1">
                            <input type="text" name="farmer_name" id="farmer_name" required class="shadow-sm focus:ring-emerald-500 focus:border-emerald-500 block w-full sm:text-sm border-gray-300 rounded-md py-2 px-3 border appearance-none">
                        </div>
                    </div>
                    
                    <div class="sm:col-span-1">
                        <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                        <div class="mt-1">
                            <input type="email" name="email" id="email" required class="shadow-sm focus:ring-emerald-500 focus:border-emerald-500 block w-full sm:text-sm border-gray-300 rounded-md py-2 px-3 border appearance-none">
                        </div>
                    </div>

                    <div class="sm:col-span-1">
                        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                        <div class="mt-1">
                            <input type="password" name="password" id="password" required class="shadow-sm focus:ring-emerald-500 focus:border-emerald-500 block w-full sm:text-sm border-gray-300 rounded-md py-2 px-3 border appearance-none">
                        </div>
                    </div>

                    <div class="sm:col-span-2">
                        <div class="relative">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full border-t border-gray-300"></div>
                            </div>
                            <div class="relative flex justify-center text-sm">
                                <span class="px-2 bg-white text-gray-500">Farm Details (Optional)</span>
                            </div>
                        </div>
                    </div>

                    <div class="sm:col-span-2">
                        <label for="farm_location" class="block text-sm font-medium text-gray-700">Farm Location</label>
                        <div class="mt-1">
                            <input type="text" name="farm_location" id="farm_location" placeholder="e.g. Punjab, India" class="shadow-sm focus:ring-emerald-500 focus:border-emerald-500 block w-full sm:text-sm border-gray-300 rounded-md py-2 px-3 border appearance-none">
                        </div>
                    </div>

                    <div class="sm:col-span-1">
                        <label for="farm_size" class="block text-sm font-medium text-gray-700">Farm Size (Acres)</label>
                        <div class="mt-1">
                            <input type="number" step="0.1" name="farm_size" id="farm_size" placeholder="5.5" class="shadow-sm focus:ring-emerald-500 focus:border-emerald-500 block w-full sm:text-sm border-gray-300 rounded-md py-2 px-3 border appearance-none">
                        </div>
                    </div>
                    
                    <div class="sm:col-span-1">
                        <label for="preferred_crops" class="block text-sm font-medium text-gray-700">Preferred Crops</label>
                        <div class="mt-1">
                            <input type="text" name="preferred_crops" id="preferred_crops" placeholder="Rice, Wheat, Tomato" class="shadow-sm focus:ring-emerald-500 focus:border-emerald-500 block w-full sm:text-sm border-gray-300 rounded-md py-2 px-3 border appearance-none">
                        </div>
                    </div>
                </div>

                <div>
                    <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-colors">
                        Create Account
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
